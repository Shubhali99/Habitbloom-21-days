<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | 21 Day Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <div class="page-shell">
    <nav class="topbar" aria-label="Site navigation">
      <a class="brand-link" href="index.html">HabitBloom</a>
      <div class="topbar-actions">
        <a class="text-link" href="signup.html">Create account</a>
      </div>
    </nav>

    <main class="auth-layout">
      <section class="hero-copy auth-copy">
        <p class="eyebrow">Welcome back</p>
        <h1>Log in and continue your 21-day habit journey.</h1>
        <p class="hero-text">
          Track progress, keep quick notes, and stay consistent with one focused habit.
        </p>
      </section>

      <section class="auth-card" aria-labelledby="login-title">
        <div class="section-heading auth-heading">
          <div>
            <p class="eyebrow">Account access</p>
            <h2 id="login-title">Log in</h2>
          </div>
          <!--p class="selected-day-label">Use the account you created in this browser.</p-->
        </div>

        <form id="loginForm" class="auth-form">
          <label class="field-label" for="loginEmail">Email</label>
          <input id="loginEmail" class="habit-input" name="email" type="email" autocomplete="email" required>

          <label class="field-label" for="loginPassword">Password</label>
          <input id="loginPassword" class="habit-input" name="password" type="password" autocomplete="current-password" required>

          <p id="loginFeedback" class="form-feedback" aria-live="polite"></p>

          <button class="button button-primary auth-submit" type="submit">Log in</button>
        </form>

        <p class="auth-switch">
          Need an account?
          <a class="text-link" href="signup.html">Create one here</a>
        </p>
      </section>
    </main>
  </div>

  <script src="auth.js"></script>
</body>
</html>
